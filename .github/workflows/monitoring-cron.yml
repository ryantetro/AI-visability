name: Scheduled Monitoring Re-scans
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
jobs:
  rescan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci
      - name: Run monitoring cron
        run: node scripts/run-monitoring.mjs
        env:
          # APP_URL is optional; the script also falls back to NEXT_PUBLIC_APP_URL
          APP_URL: ${{ secrets.APP_URL || secrets.NEXT_PUBLIC_APP_URL }}
          MONITORING_SECRET: ${{ secrets.MONITORING_SECRET }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
