name: Monitoring CI
on:
  pull_request:
    paths:
      - '.github/workflows/monitoring-*.yml'
      - 'docs/12-monitoring-alerts.md'
      - 'package.json'
      - 'scripts/monitoring-smoke.mjs'
      - 'scripts/run-monitoring.mjs'
      - 'src/app/api/cron/monitor/route.ts'
      - 'src/app/api/prompts/route.ts'
      - 'src/app/api/prompts/trends/route.ts'
      - 'src/app/advanced/panels/prompt-analytics-panel.tsx'
      - 'src/app/advanced/panels/prompt-library-panel.tsx'
      - 'src/lib/prompt-monitoring.ts'
      - 'src/lib/services/mention-tester-real.ts'
      - 'tests/mention-tester-timeouts.test.cjs'
      - 'tests/prompt-monitoring-*.test.cjs'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/monitoring-*.yml'
      - 'docs/12-monitoring-alerts.md'
      - 'package.json'
      - 'scripts/monitoring-smoke.mjs'
      - 'scripts/run-monitoring.mjs'
      - 'src/app/api/cron/monitor/route.ts'
      - 'src/app/api/prompts/route.ts'
      - 'src/app/api/prompts/trends/route.ts'
      - 'src/app/advanced/panels/prompt-analytics-panel.tsx'
      - 'src/app/advanced/panels/prompt-library-panel.tsx'
      - 'src/lib/prompt-monitoring.ts'
      - 'src/lib/services/mention-tester-real.ts'
      - 'tests/mention-tester-timeouts.test.cjs'
      - 'tests/prompt-monitoring-*.test.cjs'

jobs:
  monitoring-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:monitoring
